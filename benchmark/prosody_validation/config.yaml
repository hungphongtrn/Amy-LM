# Prosody Validation Benchmark Configuration
# Copy this file to config.yaml and fill in your values

# Directory paths (relative to benchmark/prosody_validation/)
paths:
  data_dir: "data"
  outputs_dir: "outputs"
  audio_dir: "outputs/audio"
  responses_dir: "outputs/responses"

# Model names
models:
  # Model for rewriting text to neutral form
  rewrite_model: "google/gemini-2.5-flash"
  
  # Model for text-only baseline
  text_model: "openai/gpt-4o-mini"
  
  # Multimodal model for end-to-end audio processing
  e2e_model: "google/gemini-2.5-flash"

# Batch processing settings
batch_sizes:
  tts: 32
  whisper: 32

# Concurrency settings
concurrency:
  max_concurrent_llm: 100

# API settings
api:
  openrouter_api_key: "${OPENROUTER_API_KEY}"  # Set this in your environment
  openrouter_base_url: "https://openrouter.ai/api/v1"

# Qwen3-TTS settings (on GPU machine)
qwen3_tts:
  repo_path: null  # Path to Qwen3-TTS repo, e.g., "/path/to/Qwen3-TTS"
  device: "cuda"   # "cuda" or "cpu"

# Whisper ASR settings (using HuggingFace Transformers for batching support)
whisper:
  model_id: "openai/whisper-large-v3"  # HuggingFace model ID
  model_size: "base"  # Fallback: "tiny", "base", "small", "medium", "large"
  device: "cuda"       # "cuda" or "cpu"
  language: "en"      # Language code, null for auto-detection
  chunk_length_s: 30   # Chunk length for long-form transcription
  batch_size: 16       # Batch size for inference
  attention: "sdpa"    # "flash_attention_2", "sdpa", or "default"
  torch_compile: false # torch.compile for 4.5x speed-up (not compatible with chunked algorithm)

# Logging settings
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "benchmark.log"

# Sampling settings
sampling:
  n_samples: 200
  random_state: 42
